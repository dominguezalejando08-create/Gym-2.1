<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONOS FIT | Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        :root {
            --primary: #9d4edd; --accent: #ff85a1; --bg: #fff5f8; --card: #ffffff;
            --text: #4a1e4a; --text-light: #8e7d8e; --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --radius: 20px; --border: rgba(0,0,0,0.08);
        }
        .tema-niña { --primary: #9d4edd; --accent: #ff85a1; --bg: #fff5f8; --gradient: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
        .tema-niño { --primary: #2563eb; --accent: #22c55e; --bg: #f1f5f9; --text: #0f172a; --text-light: #64748b; --gradient: linear-gradient(135deg, #3b82f6 0%, #22c55e 100%); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); width: 100vw; overflow-x: hidden; padding-bottom: 110px; }
        
        #bloqueo-pestaña { position: fixed; inset: 0; background: white; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #pantalla-inicio { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        header { padding: 30px 20px; text-align: center; background: var(--gradient); color: white; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; position: relative; }
        #socio-display { position: absolute; top: 12px; left: 20px; font-size: 0.7rem; font-weight: 800; background: rgba(0,0,0,0.25); padding: 5px 12px; border-radius: 20px; }
        
        nav { 
            display: flex; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); 
            position: fixed; bottom: 0; width: 100%; z-index: 1000; 
            justify-content: space-around; border-top: 2px solid var(--border); padding: 15px 0;
            height: 90px;
        }
        nav button { 
            border: none; background: none; font-weight: 700; font-size: 0.75rem;
            color: var(--text-light); cursor: pointer; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 0.2s; flex:1;
        }
        nav button span { font-size: 1.8rem; margin-bottom: 4px; }
        nav button.active { color: var(--primary); background: rgba(157, 78, 221, 0.08); border-radius: 15px; margin: 0 5px; }

        section { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 20px 15px; }
        section.active { display: block; }
        .card { background: var(--card); border-radius: var(--radius); padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .ex-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--card); border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
        .ex-img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; background: #f0f0f0; }
        .btn { padding: 15px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; width: 100%; font-size: 0.9rem; margin-top: 10px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-danger { background: #ff4d6d; color: white; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; font-family: inherit; }
        .progress-container { background: rgba(0,0,0,0.05); border-radius: 15px; height: 12px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; transition: 0.4s ease-out; }
        #frase-momento { font-style: italic; font-size: 0.85rem; color: rgba(255,255,255,0.9); text-align: center; margin-top: 12px; padding: 0 15px; line-height: 1.3; font-weight: 300; }
    </style>
</head>
<body>

<div id="bloqueo-pestaña">
    <h2 style="color:var(--primary)">¡Sesión Activa!</h2>
    <p>Ya tienes MONOS FIT abierto en otra pestaña.</p>
    <button class="btn btn-main" onclick="window.close()">Regresar a la pestaña activa</button>
</div>

<div id="pantalla-inicio">
    <h1 style="color:#4a1e4a;">MONOS FIT</h1>
    <input type="text" id="input-socio" placeholder="N° Socio" style="max-width: 250px; text-align: center;">
    <div style="display:flex;"><button onclick="validarIngreso('niña')" style="font-size:3.5rem; background:none; border:none; cursor:pointer;">🌸</button>
    <button onclick="validarIngreso('niño')" style="font-size:3.5rem; background:none; border:none; cursor:pointer;">⚡</button></div>
</div>

<header>
    <div id="socio-display">Socio: ---</div>
    <h1 id="titulo-header" style="font-size:1.8rem; margin-bottom:10px; letter-spacing: 2px;">MONOS FIT</h1>
    <select id="selector-dia-manual" onchange="cambiarDiaManual(this.value)" style="width:auto; background:rgba(255,255,255,0.2); border:none; color:white; font-weight:bold; border-radius:10px; padding: 5px 15px; font-size: 1rem;">
        <option value="1">Día 1</option><option value="2">Día 2</option><option value="3">Día 3</option><option value="4">Día 4</option><option value="5">Día 5</option><option value="6">Día 6</option><option value="7">Día 7</option>
    </select>
    <div id="frase-momento">"Tu única competencia eres tú mismo."</div>
</header>

<nav id="main-nav">
    <button class="active" data-section="entrenar"><span>🏠</span>HOY</button>
    <button data-section="rutina"><span>📝</span>PLAN</button>
    <button data-section="dieta"><span>🍎</span>DIETA</button>
    <button data-section="suples"><span>💊</span>SUPLES</button>
    <button data-section="progreso"><span>📉</span>EVO</button>
    <button data-section="ajustes"><span>⚙️</span>GEAR</button>
</nav>

<section id="entrenar" class="active">
    <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
    <div id="listaEntrenamiento"></div>
</section>

<section id="rutina">
    <div class="card">
        <h3>➕ Nuevo Ejercicio</h3>
        <select id="r_dia">
            <option value="1">Día 1</option><option value="2">Día 2</option><option value="3">Día 3</option>
            <option value="4">Día 4</option><option value="5">Día 5</option><option value="6">Día 6</option><option value="7">Día 7</option>
        </select>
        <input type="text" id="r_nombre" placeholder="Nombre del ejercicio">
        <input type="text" id="r_series" placeholder="Series y Repeticiones (ej: 4x12)">
        <input type="file" id="r_file" accept="image/*">
        <button class="btn btn-main" onclick="guardarEjercicio()">Guardar Ejercicio</button>
        <button class="btn btn-danger" onclick="eliminarTodasRutinas()">🗑️ Limpiar Plan Completo</button>
    </div>
    <div id="visor-plan-detallado"></div>
</section>

<section id="dieta"><div class="card"><h3>🍴 Dieta</h3><select id="d_menu_sel" onchange="cargarFormDieta()"><option value="menuA">Menú A</option><option value="menuB">Menú B</option></select><textarea id="d_des" placeholder="Desayuno" rows="3"></textarea><textarea id="d_s1" placeholder="Snack 1" rows="3"></textarea><textarea id="d_com" placeholder="Comida" rows="3"></textarea><textarea id="d_s2" placeholder="Snack 2" rows="3"></textarea><textarea id="d_cen" placeholder="Cena" rows="3"></textarea><button class="btn btn-main" onclick="guardarDieta()">Guardar Dieta</button></div></section>
<section id="suples"><div class="card"><h3>💊 Suplementación</h3><input id="s_nombre" placeholder="Nombre"><input id="s_momento" placeholder="Instrucciones"><button class="btn btn-main" onclick="agregarSuplemento()">Añadir Suple</button></div><div id="lista-suples"></div></section>

<section id="progreso">
    <div class="card">
        <h3>📉 Evolución</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <input type="number" id="e_peso" placeholder="Peso (kg)" step="0.1">
            <input type="number" id="e_cintura" placeholder="Cintura (cm)" step="0.1">
            <input type="number" id="e_cadera" placeholder="Cadera (cm)" step="0.1">
            <input type="number" id="e_grasa" placeholder="% Grasa" step="0.1">
            <input type="number" id="e_musculo" placeholder="% Músculo" step="0.1">
        </div>
        <button class="btn btn-main" onclick="registrarEvo()">Guardar Métricas</button>
    </div>
    <div id="lista-evo"></div>
</section>

<section id="ajustes"><div class="card"><h3>👤 Socio</h3><input type="text" id="edit-socio-num"><button class="btn btn-main" onclick="actualizarSocio()">Actualizar Número</button></div><div class="card"><h3>⚙️ Sistema</h3><button class="btn btn-main" onclick="exportarData()">📤 Exportar Backup</button><button class="btn" style="background:#22c55e; color:white;" onclick="document.getElementById('importInput').click()">📥 Importar Backup</button><input type="file" id="importInput" style="display:none" onchange="importarData(event)"><button class="btn btn-danger" onclick="eliminarTodo()">⚠️ Reset de Fábrica</button></div></section>

<script>
const bc = new BroadcastChannel('monos_fit_global');
bc.postMessage({type: 'NEW_TAB_OPENED'});
bc.onmessage = (e) => {
    if (e.data.type === 'NEW_TAB_OPENED') bc.postMessage({type: 'ALREADY_ACTIVE'});
    if (e.data.type === 'ALREADY_ACTIVE') document.getElementById('bloqueo-pestaña').style.display = 'flex';
};

const STORAGE_KEY = 'MONOS_FIT_PRO_VFINAL';
let DB = { tema: 'niña', socio: "", diaActual: 1, rutinas: {"1":[],"2":[],"3":[],"4":[],"5":[],"6":[],"7":[]}, dieta: {menuA:{},menuB:{}}, suplementos: [], evo: [] };
const frases = ["El éxito es la suma de pequeños esfuerzos.", "Tu cuerpo escucha lo que tu mente dice.", "No te detengas hasta estar orgulloso.", "La disciplina es la clave.", "Cada gota de sudor cuenta.", "Fuerte es quien no se rinde.", "Hoy es un gran día para entrenar.", "Tu única competencia eres tú mismo."];

function actualizarFrase() {
    const f = document.getElementById('frase-momento');
    if(f) f.innerText = `"${frases[Math.floor(Math.random()*frases.length)]}"`;
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }

function load() {
    const data = localStorage.getItem(STORAGE_KEY);
    if(data) {
        try {
            const temp = JSON.parse(data);
            DB = Object.assign({}, DB, temp);
            if(DB.socio) {
                aplicarTema(DB.tema || 'niña');
                document.getElementById('pantalla-inicio').style.display = 'none';
                document.getElementById('edit-socio-num').value = DB.socio;
                document.getElementById('selector-dia-manual').value = DB.diaActual;
                actualizarFrase();
                renderTodo(); 
            }
        } catch(e) { console.error(e); }
    }
}

function validarIngreso(t) {
    const s = document.getElementById('input-socio').value.trim();
    if(!s) return alert("Ingresa tu socio");
    DB.socio = s; DB.tema = t; aplicarTema(t);
    document.getElementById('pantalla-inicio').style.display = 'none';
    save(); renderTodo();
}

function aplicarTema(t) {
    document.body.className = 'tema-' + t;
    const sd = document.getElementById('socio-display');
    if(sd) sd.innerText = "SOCIO: " + DB.socio;
}

function renderTodo() { 
    renderEntrenamiento(); 
    renderPlan(); 
    renderSuples(); 
    renderEvo(); 
    cargarFormDieta(); 
}

function renderEntrenamiento() {
    const cont = document.getElementById('listaEntrenamiento');
    if(!cont) return;
    const ejercicios = DB.rutinas[DB.diaActual.toString()] || [];
    let completados = 0;
    let html = "";
    
    ejercicios.forEach((ej, idx) => {
        if(ej.done) completados++;
        html += `<div class="ex-card">
            <img src="${ej.img || 'https://via.placeholder.com/60?text=FIT'}" class="ex-img">
            <div style="flex:1"><b>${ej.nombre}</b><br><small>${ej.series}</small></div>
            <input type="checkbox" style="width:30px; height:30px;" ${ej.done?'checked':''} onchange="marcarEjercicio(${idx})">
        </div>`;
    });
    
    cont.innerHTML = html || "<p style='text-align:center; opacity:0.5; padding:20px;'>No hay ejercicios para hoy.</p>";
    
    const p = ejercicios.length ? (completados / ejercicios.length) * 100 : 0;
    const bar = document.getElementById('bar');
    if(bar) bar.style.width = p + "%";

    // --- LÓGICA DE AVANCE Y RESET AUTOMÁTICO ---
    if(p === 100 && ejercicios.length > 0) {
        setTimeout(() => {
            let sig = DB.diaActual + 1;
            let encontrado = false;
            
            // Buscar si hay más días con ejercicios
            for(let i = sig; i <= 7; i++){
                if(DB.rutinas[i.toString()] && DB.rutinas[i.toString()].length > 0){
                    DB.diaActual = i; 
                    document.getElementById('selector-dia-manual').value = i;
                    encontrado = true;
                    alert("¡Día terminado! Pasando al Día " + i);
                    break;
                }
            }

            // Si no encontró más días, resetear todo al Día 1
            if(!encontrado) { 
                alert("¡Felicidades! Has terminado todos los días del plan."); 
                
                // 1. Regresar al Día 1
                DB.diaActual = 1;
                document.getElementById('selector-dia-manual').value = 1;
                
                // 2. Quitar todas las palomitas de todos los días
                for(let d = 1; d <= 7; d++) {
                    if(DB.rutinas[d.toString()]) {
                        DB.rutinas[d.toString()].forEach(ex => ex.done = false);
                    }
                }
            }
            
            save(); 
            renderTodo();
        }, 400);
    }
}

function marcarEjercicio(idx) { 
    DB.rutinas[DB.diaActual.toString()][idx].done = !DB.rutinas[DB.diaActual.toString()][idx].done; 
    save(); renderEntrenamiento(); 
}

function renderPlan() {
    const visor = document.getElementById('visor-plan-detallado');
    if(!visor) return;
    let html = ""; 
    for(let d = 1; d <= 7; d++) { 
        if(DB.rutinas[d.toString()] && DB.rutinas[d.toString()].length > 0) {
            html += `<div class='card'><b>DÍA ${d}</b><br>`;
            DB.rutinas[d.toString()].forEach((e, i) => {
                html += `<div style='display:flex; justify-content:space-between; align-items:center; margin:8px 0; border-bottom:1px solid #eee; padding-bottom:5px;'>
                        <span>${e.nombre} <small>(${e.series})</small></span>
                        <span style='color:red; font-weight:bold; cursor:pointer; padding:5px;' onclick='eliminarEjercicio(${d}, ${i})'>✕</span>
                      </div>`;
            });
            html += `</div>`;
        }
    } 
    visor.innerHTML = html || "<p style='text-align:center; opacity:0.5;'>Plan vacío.</p>";
}

function guardarEjercicio() {
    const d = document.getElementById('r_dia').value;
    const n = document.getElementById('r_nombre').value.trim();
    const s = document.getElementById('r_series').value.trim();
    const f = document.getElementById('r_file').files[0];
    if(!n) return alert("Pon nombre");
    const add = (imgData = "") => {
        if(!DB.rutinas[d]) DB.rutinas[d] = [];
        DB.rutinas[d].push({ nombre: n, series: s, img: imgData, done: false });
        save(); renderTodo();
        document.getElementById('r_nombre').value = ""; document.getElementById('r_series').value = "";
        alert("Ejercicio añadido al Día " + d);
    };
    if(f) {
        const reader = new FileReader();
        reader.onload = (e) => add(e.target.result);
        reader.readAsDataURL(f);
    } else { add(); }
}

function eliminarEjercicio(dia, idx) { DB.rutinas[dia.toString()].splice(idx, 1); save(); renderTodo(); }
function cambiarDiaManual(v) { DB.diaActual = parseInt(v); save(); renderEntrenamiento(); }

function guardarDieta() { 
    const s = document.getElementById('d_menu_sel').value; 
    DB.dieta[s] = { 
        desayuno: document.getElementById('d_des').value, 
        snack1: document.getElementById('d_s1').value, 
        comida: document.getElementById('d_com').value, 
        snack2: document.getElementById('d_s2').value, 
        cena: document.getElementById('d_cen').value 
    }; 
    save(); alert("Dieta guardada"); 
}

function cargarFormDieta() { 
    const menuSel = document.getElementById('d_menu_sel').value;
    const m = DB.dieta[menuSel] || {}; 
    document.getElementById('d_des').value = m.desayuno || ""; 
    document.getElementById('d_s1').value = m.snack1 || ""; 
    document.getElementById('d_com').value = m.comida || ""; 
    document.getElementById('d_s2').value = m.snack2 || ""; 
    document.getElementById('d_cen').value = m.cena || ""; 
}

function agregarSuplemento() { 
    const n = document.getElementById('s_nombre').value; 
    if(n) { DB.suplementos.push({ nombre:n, momento: document.getElementById('s_momento').value }); save(); renderSuples(); document.getElementById('s_nombre').value = ""; } 
}
function renderSuples() { document.getElementById('lista-suples').innerHTML = DB.suplementos.map((s, i) => `<div class="ex-card"><div style="flex:1"><b>${s.nombre}</b><br><small>${s.momento}</small></div><button style="border:none; background:none; color:red;" onclick="DB.suplementos.splice(${i},1);save();renderSuples();">🗑️</button></div>`).join(''); }

function registrarEvo() {
    const p = document.getElementById('e_peso').value || "0";
    const ci = document.getElementById('e_cintura').value || "0";
    const ca = document.getElementById('e_cadera').value || "0";
    const g = document.getElementById('e_grasa').value || "0";
    const m = document.getElementById('e_musculo').value || "0";
    const nuevaEntrada = { fecha: new Date().toLocaleDateString(), peso: p, cintura: ci, cadera: ca, grasa: g, musculo: m };
    if (!Array.isArray(DB.evo)) DB.evo = [];
    DB.evo.unshift(nuevaEntrada);
    save(); renderEvo();
    ['e_peso', 'e_cintura', 'e_cadera', 'e_grasa', 'e_musculo'].forEach(id => document.getElementById(id).value = "");
    alert("¡Métricas guardadas!");
}

function renderEvo() {
    const contenedor = document.getElementById('lista-evo');
    if (!contenedor) return;
    if (!DB.evo || DB.evo.length === 0) { contenedor.innerHTML = "<p style='text-align:center; opacity:0.5; padding:20px;'>Aún no tienes registros.</p>"; return; }
    contenedor.innerHTML = DB.evo.map((e, i) => `
        <div class="card" style="position:relative; border-left: 5px solid var(--primary);">
            <button onclick="if(confirm('¿Borrar?')){DB.evo.splice(${i},1);save();renderEvo();}" style="position:absolute; top:10px; right:10px; border:none; background:none; color:red; font-weight:bold;">✕</button>
            <div style="font-size:0.9rem; font-weight:bold; color:var(--primary); margin-bottom:10px;">📅 ${e.fecha}</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:0.85rem;">
                <div>⚖️ Peso: <b>${e.peso} kg</b></div>
                <div>📏 Cint: <b>${e.cintura} cm</b></div>
                <div>🍑 Cade: <b>${e.cadera} cm</b></div>
                <div>🔥 Gras: <b>${e.grasa} %</b></div>
                <div>💪 Musc: <b>${e.musculo} %</b></div>
            </div>
        </div>
    `).join('');
}

function exportarData() {
    const blob = new Blob([JSON.stringify(DB)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `backup_monos_fit.json`; a.click();
}
function importarData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        try { localStorage.setItem(STORAGE_KEY, ev.target.result); location.reload(); } catch(err) { alert("Error"); }
    };
    reader.readAsText(file);
}
function actualizarSocio() { const n = document.getElementById('edit-socio-num').value.trim(); if(n) { DB.socio = n; save(); location.reload(); } }
function eliminarTodo() { if(confirm("¿Borrar TODO?")) { localStorage.clear(); location.reload(); } }
function eliminarTodasRutinas() { if(confirm("¿Borrar plan?")) { DB.rutinas = {"1":[],"2":[],"3":[],"4":[],"5":[],"6":[],"7":[]}; save(); renderTodo(); } }

document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.section).classList.add('active');
        actualizarFrase();
    });
});

load();
</script>
</body>
</html>
